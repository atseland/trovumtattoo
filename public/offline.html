<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Du er offline — Trovum Tattoo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0c0b;
      color: #c9b99a;
      font-family: Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    h1 { font-style: italic; font-size: 2rem; margin-bottom: 12px; }
    p { color: #7a6e62; font-size: 0.95rem; line-height: 1.6; max-width: 320px; }
    button {
      margin-top: 28px;
      padding: 12px 24px;
      background: #c9933a;
      color: #0d0c0b;
      border: none;
      border-radius: 4px;
      font-size: 0.9rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Du er offline</h1>
  <p>Det ser ut til at du ikke har internettforbindelse. Koble til nett og prøv igjen.</p>
  <button onclick="location.reload()">Prøv igjen</button>
</body>
</html>
