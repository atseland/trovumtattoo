<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Du er frakoblet — Trovum Tattoo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@1,400&family=Jost:wght@400;500&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0b09;
      color: #ede9e6;
      font-family: 'Jost', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    img { height: 36px; opacity: 0.35; margin-bottom: 32px; filter: invert(93%) sepia(5%) saturate(200%) hue-rotate(340deg) brightness(95%); }
    h1 {
      font-family: 'EB Garamond', Georgia, serif;
      font-style: italic;
      font-size: clamp(28px, 5vw, 42px);
      color: #ede9e6;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 12px;
    }
    p {
      font-family: 'Jost', sans-serif;
      color: #8a8078;
      font-size: 13px;
      line-height: 1.8;
      max-width: 32ch;
    }
    button {
      margin-top: 28px;
      padding: 14px 28px;
      background: transparent;
      color: #ede9e6;
      border: 1px solid rgba(237,233,230,0.14);
      font-family: 'Jost', sans-serif;
      font-size: 8.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      min-height: 44px;
      transition: border-color 0.25s, background 0.25s;
    }
    button:hover {
      border-color: rgba(237,233,230,0.38);
      background: rgba(237,233,230,0.04);
    }
  </style>
</head>
<body>
  <img src="/logo.png" alt="Trovum Tattoo" />
  <h1>Du er frakoblet</h1>
  <p>Sjekk internettforbindelsen og prøv igjen.</p>
  <button onclick="location.reload()">Prøv igjen</button>
</body>
</html>
